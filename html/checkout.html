<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Amino Z</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/checkout.css">
</head>
<body>

<div class="menu-overlay" id="menu-overlay"></div>

    <aside class="side-menu" id="side-menu">
        <div class="side-menu-header">
            <img src="https://www.aminoz.com.au/media/buyshop/default/logo2604a.png" alt="Amino Z Logo" class="side-menu-logo">
            <button type="button" class="close-menu-btn" id="close-menu-btn" aria-label="Close menu">✕</button>
        </div>
        <nav class="side-menu-nav">
            <a href="homepage.html">Home</a>
            <a href="results.html">Shop All Protein</a>
            <a href="results.html">Pre-Workout</a>
            <a href="results.html">Vitamins & Wellness</a>
            <a href="search.html">Search Products</a>
            <a href="cart.html">Your Cart</a>
        </nav>
    </aside>

    <header>
        <nav aria-label="Main Navigation" class="top-nav-bar">
            <button class="menu-toggle" aria-label="Open Menu">
                <img src="https://static.thenounproject.com/png/683452-200.png" alt="Menu icon">
            </button>
            
            <a href="homepage.html" class="brand-logo" aria-label="Home">
                <img src="https://www.aminoz.com.au/media/buyshop/default/logo2604a.png" alt="Amino Z Logo">
            </a>

            <div class="header-search-container">
                <img src="https://cdn-icons-png.flaticon.com/512/54/54481.png" alt="Search icon" class="search-glass-icon">
                <input type="text" placeholder="" aria-label="Search">
            </div>
            
            <a href="cart.html" class="cart-link" aria-label="Cart">
                <div class="cart-icon-wrapper">
                    <img src="https://assets.streamlinehq.com/image/private/w_300,h_300,ar_1/f_auto/v1/icons/all-3/shopping-cart-9xhllmo2cb79djc9j7b5kb.png/shopping-cart-pe974q2wd8bzu5cueg3qr.png?_a=DATAiZAAZAA0" alt="Cart icon">
                    <span class="cart-badge" id="cart-badge">0</span>
                </div>
            </a>
        </nav>
    </header>

    <main class="checkout-page-main">
        <div class="checkout-layout">
            
            <div class="checkout-form-column">
                <h1 class="checkout-page-title">Checkout</h1>

                <form id="checkout-form" action="confirmation.html" method="GET">

                    <section class="checkout-step active" id="step-contact">
                        <div class="step-header">
                            <h2>1. Contact</h2>
                            <span class="edit-btn">Edit</span>
                        </div>
                        <div class="step-content">
                            <div class="input-group">
                                <label for="email">Email:</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            <button type="button" class="confirm-btn">Confirm Email</button>
                        </div>
                    </section>

                    <section class="checkout-step locked" id="step-shipping">
                        <div class="step-header">
                            <h2>2. Shipping</h2>
                            <span class="edit-btn">Edit</span>
                        </div>
                        <div class="step-content">
                            <div class="payment-row">
                                <div class="input-group half-width">
                                    <label for="first-name">First Name:</label>
                                    <input type="text" id="first-name" name="first-name" required>
                                </div>
                                <div class="input-group half-width">
                                    <label for="last-name">Last Name:</label>
                                    <input type="text" id="last-name" name="last-name" required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="company">Company Name (optional):</label>
                                <input type="text" id="company" name="company">
                            </div>
                            <div class="input-group">
                                <label for="address">Address:</label>
                                <input type="text" id="address" name="address" required>
                            </div>
                            <div class="input-group">
                                <label for="country">Country:</label>
                                <input type="text" id="country" name="country" required>
                            </div>
                            <div class="input-group">
                                <label for="phone">Phone Number (optional):</label>
                                <input type="tel" id="phone" name="phone">
                            </div>
                            <div class="input-group">
                                <label for="instructions">Delivery Instructions:</label>
                                <textarea id="instructions" name="instructions" rows="3"></textarea>
                            </div>
                            <button type="button" class="confirm-btn">Confirm Shipping</button>
                        </div>
                    </section>

                    <section class="checkout-step locked" id="step-payment">
                        <div class="step-header">
                            <h2>3. Payment</h2>
                        </div>
                        <div class="step-content">
                            <div class="input-group">
                                <label for="card">Card Number:</label>
                                <input type="text" id="card" name="card" pattern="[0-9]{16}" title="Please enter 16 digits" required>
                            </div>
                            <div class="input-group">
                                <label for="name-on-card">Name on Card:</label>
                                <input type="text" id="name-on-card" name="name-on-card" required>
                            </div>
                            
                            <div class="payment-row">
                                <div class="input-group half-width">
                                    <label for="expiry">Expiry Date:</label>
                                    <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required>
                                </div>
                                <div class="input-group half-width">
                                    <label for="cvv">CVV:</label>
                                    <input type="text" id="cvv" name="cvv" pattern="[0-9]{3,4}" required>
                                </div>
                            </div>

                            <div class="input-group">
                                <label for="billing-address">Billing Address:</label>
                                <input type="text" id="billing-address" name="billing-address" required>
                            </div>
                            <div class="input-group">
                                <label for="billing-address-2">Billing Address 2 (optional):</label>
                                <input type="text" id="billing-address-2" name="billing-address-2">
                            </div>
                            
                            <div class="payment-row">
                                <div class="input-group half-width">
                                    <label for="zip">ZIP Code:</label>
                                    <input type="text" id="zip" name="zip" required>
                                </div>
                                <div class="input-group half-width">
                                    <label for="billing-country">Country:</label>
                                    <input type="text" id="billing-country" name="billing-country" required>
                                </div>
                            </div>
                            
                            <button type="submit" class="place-order-btn">Place Order</button>
                        </div>
                    </section>

                </form>
            </div>

            <div class="order-summary-column">
                <div class="summary-box">
                    <h2>Order Summary</h2>
                    
                    <div id="checkout-items-list" class="summary-items">
                    </div>

                   <div class="summary-totals">
            <div class="totals-row">
         <span>Subtotal</span>
         <span id="summary-subtotal">$0.00</span>
         </div>
          <div class="totals-row">
        <span>Shipping</span>
        <span id="summary-shipping">$10.00</span>
      </div>
      <div class="totals-row grand-total">
        <span>Total</span>
        <span id="summary-grand-total">$0.00</span>
                 </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="../js/checkout.js"></script>
    <script src="../js/global.js"></script>
</body>
</html>
