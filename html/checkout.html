<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Amino Z</title>
    <link rel="stylesheet" href="../css/checkout.css">
</head>
<body>

    <!-- header -->
    <header>
        <nav>
            <div class="brand-logo">
                <button class="brand-logo" aria-label="Home">
                    <img src="https://www.aminoz.com.au/media/buyshop/default/logo2604a.png" alt="Amino Z Logo">
                </button>
            </div>
        </nav>
    </header>

    <!-- checkout -->
    <main class="checkout-page-main">
        
        <h1 class="checkout-page-title">Checkout:</h1>

        <form id="checkout-form" action="confirmation.html" method="GET">

            <!-- contact (default) -->
            <section class="checkout-step active" id="step-contact">
                <div class="step-header">
                    <h2>1. Contact</h2>
                    <span class="edit-btn">Edit</span>
                </div>
                <div class="step-content">
                    <div class="input-group">
                        <label for="email">Email:</label>

                        <input type="email" id="email" name="email" required>
                    </div>
                    <button type="button" class="confirm-btn">Confirm Email</button>
                </div>
            </section>

            <!-- shipping  -->
            <section class="checkout-step locked" id="step-shipping">
                <div class="step-header">
                    <h2>2. Shipping</h2>
                    <span class="edit-btn">Edit</span>
                </div>
                <div class="step-content">
                    <div class="input-group">
                        <label for="first-name">First Name:</label>
                        <input type="text" id="first-name" name="first-name" required>
                    </div>
                    <div class="input-group">
                        <label for="last-name">Last Name:</label>
                        <input type="text" id="last-name" name="last-name" required>
                    </div>
                    <div class="input-group">
                        <label for="company">Company Name (optional):</label>
                        <input type="text" id="company" name="company">
                    </div>
                    <div class="input-group">
                        <label for="address">Address:</label>
                        <input type="text" id="address" name="address" required>
                    </div>
                    <div class="input-group">
                        <label for="country">Country:</label>
                        <input type="text" id="country" name="country" required>
                    </div>
                    <div class="input-group">
                        <label for="phone">Phone Number (optional):</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    <div class="input-group">
                        <label for="instructions">Delivery Instructions:</label>
                        <textarea id="instructions" name="instructions" rows="3"></textarea>
                    </div>
                    <button type="button" class="confirm-btn">Confirm Shipping</button>
                </div>
            </section>

            <!-- payment -->
            <section class="checkout-step locked" id="step-payment">
                <div class="step-header">
                    <h2>3. Payment</h2>
                </div>
                <div class="step-content">
                    <div class="input-group">
                        <label for="card">Card Number:</label>

                        <input type="text" id="card" name="card" pattern="[0-9]{16}" title="Please enter 16 digits" required>
                    </div>
                    <div class="input-group">
                        <label for="name-on-card">Name on Card:</label>
                        <input type="text" id="name-on-card" name="name-on-card" required>
                    </div>
                    
                    <div class="payment-row">
                        <div class="input-group half-width">
                            <label for="expiry">Expiry Date:</label>
                            <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required>
                        </div>
                        <div class="input-group half-width">
                            <label for="cvv">CVV:</label>
                            <input type="text" id="cvv" name="cvv" pattern="[0-9]{3,4}" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="billing-address">Billing Address:</label>
                        <input type="text" id="billing-address" name="billing-address" required>
                    </div>
                    <div class="input-group">
                        <label for="billing-address-2">Billing Address 2 (optional):</label>
                        <input type="text" id="billing-address-2" name="billing-address-2">
                    </div>
                    
                    <div class="payment-row">
                        <div class="input-group half-width">
                            <label for="zip">ZIP Code:</label>
                            <input type="text" id="zip" name="zip" required>
                        </div>
                        <div class="input-group half-width">
                            <label for="billing-country">Country:</label>
                            <input type="text" id="billing-country" name="billing-country" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="place-order-btn">Place Order</button>
                </div>
            </section>

        </form>

    </main>


    <script src="../js/checkout.js"></script>


</body>
</html>
