<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation - Amino Z</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/confirmation.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="brand-logo" aria-label="Return to homepage">
                <img src="https://www.aminoz.com.au/media/buyshop/default/logo2604a.png" alt="Amino Z Logo">
            </a>
        </nav>  
    </header>   

<main class="confirmation-main">
        
        <section class="success-message" aria-labelledby="success-heading">
            
            <div class="check-circle" aria-hidden="true">
                <span>✓</span>
            </div>

            <h1 id="success-heading">Thank you for your purchase!</h1>
            <p>Your order has been received and is being processed. We have sent an email confirmation with your receipt and tracking details.</p>
            
            <a href="index.html" class="back-home-btn">Continue Shopping</a>
        </section>

    </main>

    <script src="../js/confirmation.js"></script>
</body>
</html>
